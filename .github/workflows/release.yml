name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            archive: zip
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Ensure target is installed
        run: rustup target add ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        if: "!startsWith(matrix.os, 'macos')"
      - name: Build
        shell: bash
        run: rustup run stable cargo build -p koda-agent-cli --release --locked --target ${{ matrix.target }}
      - name: Package Unix
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          mkdir -p dist/pkg
          cp target/${{ matrix.target }}/release/koda-agent dist/pkg/koda-agent
          mkdir -p dist/pkg/resources
          cp -R assets memory config dist/pkg/resources/
          cp requirements-python-*.txt dist/pkg/resources/
          rm -f dist/pkg/resources/assets/tmwd_cdp_bridge/config.js
          rm -f dist/pkg/resources/config/llms.toml
          rm -f dist/pkg/resources/memory/global_mem.txt dist/pkg/resources/memory/global_mem_insight.txt dist/pkg/resources/memory/file_access_stats.json dist/pkg/resources/memory/long_term_updates.jsonl dist/pkg/resources/memory/pending_long_term_updates.md
          find dist/pkg/resources/memory/L4_raw_sessions -type f ! -name compress_session.py -delete
          tar -C dist/pkg -czf dist/koda-agent-${{ matrix.target }}.tar.gz koda-agent resources
          (cd dist && shasum -a 256 koda-agent-${{ matrix.target }}.tar.gz > koda-agent-${{ matrix.target }}.tar.gz.sha256)
      - name: Package Windows
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/pkg | Out-Null
          Copy-Item target/${{ matrix.target }}/release/koda-agent.exe dist/pkg/koda-agent.exe
          New-Item -ItemType Directory -Force -Path dist/pkg/resources | Out-Null
          Copy-Item -Recurse -Force assets, memory, config dist/pkg/resources/
          Copy-Item -Force requirements-python-*.txt dist/pkg/resources/
          Remove-Item -Force -ErrorAction SilentlyContinue dist/pkg/resources/assets/tmwd_cdp_bridge/config.js
          Remove-Item -Force -ErrorAction SilentlyContinue dist/pkg/resources/config/llms.toml
          Remove-Item -Force -ErrorAction SilentlyContinue dist/pkg/resources/memory/global_mem.txt, dist/pkg/resources/memory/global_mem_insight.txt, dist/pkg/resources/memory/file_access_stats.json, dist/pkg/resources/memory/long_term_updates.jsonl, dist/pkg/resources/memory/pending_long_term_updates.md
          Get-ChildItem -Path dist/pkg/resources/memory/L4_raw_sessions -File -ErrorAction SilentlyContinue | Where-Object { $_.Name -ne 'compress_session.py' } | Remove-Item -Force
          Compress-Archive -Path dist/pkg/koda-agent.exe, dist/pkg/resources -DestinationPath dist/koda-agent-${{ matrix.target }}.zip -Force
          (Get-FileHash -Algorithm SHA256 dist/koda-agent-${{ matrix.target }}.zip).Hash.ToLower() + '  koda-agent-${{ matrix.target }}.zip' | Out-File -Encoding ascii dist/koda-agent-${{ matrix.target }}.zip.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: koda-agent-${{ matrix.target }}
          path: dist/*

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Merge checksums
        run: |
          find artifacts -name '*.sha256' -print0 | xargs -0 cat > SHA256SUMS
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} . \;
      - name: Build resources archive
        run: |
          TMPDIR=$(mktemp -d)
          mkdir -p "${TMPDIR}/resources"
          cp -R assets memory config "${TMPDIR}/resources/"
          cp requirements-python-*.txt "${TMPDIR}/resources/" 2>/dev/null || true
          rm -f "${TMPDIR}/resources/assets/tmwd_cdp_bridge/config.js" 2>/dev/null || true
          rm -f "${TMPDIR}/resources/config/llms.toml" 2>/dev/null || true
          rm -f "${TMPDIR}/resources/memory/global_mem.txt" \
                "${TMPDIR}/resources/memory/global_mem_insight.txt" \
                "${TMPDIR}/resources/memory/file_access_stats.json" \
                "${TMPDIR}/resources/memory/long_term_updates.jsonl" \
                "${TMPDIR}/resources/memory/pending_long_term_updates.md" 2>/dev/null || true
          find "${TMPDIR}/resources/memory/L4_raw_sessions" -type f ! -name 'compress_session.py' -delete 2>/dev/null || true
          tar -C "${TMPDIR}" -czf resources.tar.gz resources
          sha256sum resources.tar.gz >> SHA256SUMS
      - name: Generate resources manifest
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TAG="${GITHUB_REF_NAME}"
          RES_SHA256=$(sha256sum resources.tar.gz | awk '{print $1}')
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/resources.tar.gz"
          BINARY_VERSION=$(cargo metadata --format-version=1 --no-deps 2>/dev/null \
            | python3 -c "import sys,json; pkgs=[p for p in json.load(sys.stdin)['packages'] if p['name']=='koda-agent-cli']; print(pkgs[0]['version'] if pkgs else 'unknown')")
          PUBLISHED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          mkdir -p resources
          python3 -c "
          import json
          manifest = {
              'version': '${VERSION}',
              'published_at': '${PUBLISHED_AT}',
              'min_binary_version': '${BINARY_VERSION}',
              'download_url': '${DOWNLOAD_URL}',
              'sha256': '${RES_SHA256}',
              'changelog': ''
          }
          with open('resources/resources-manifest.json', 'w') as f:
              json.dump(manifest, f, indent=2)
              f.write('\n')
          "
          cat resources/resources-manifest.json
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            koda-agent-*.tar.gz
            koda-agent-*.zip
            resources.tar.gz
            SHA256SUMS
      - name: Commit manifest to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f resources/resources-manifest.json
          git diff --cached --quiet && exit 0
          git commit -m "Update resources-manifest.json for ${GITHUB_REF_NAME}"
          git push origin HEAD:main
