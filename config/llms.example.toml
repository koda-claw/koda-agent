# Koda Agent LLM profiles. Copy to ~/.koda-agent/config/llms.toml or run:
#   koda-agent config setup mimo
# Secrets should live in ~/.koda-agent/.env, not in this TOML file.

[selector]
default_profile = "mimo"
default_model = "pro"

[defaults]
stream = true
timeout_secs = 1200
connect_timeout_secs = 30
verify_tls = true
temperature = 1.0
max_tokens = 16384
failover = true

[[profiles]]
name = "mimo"
kind = "native_oai"
base_url = "https://api.xiaomimimo.com/v1"
api_key_env = "MIMO_API_KEY"
auth_scheme = "header"
auth_header = "api-key"
api_mode = "chat_completions"
stream = true
max_tokens = 32768

[[profiles.models]]
name = "pro"
id = "mimo-v2.5-pro"
max_tokens = 32768

[[profiles.models]]
name = "vision"
id = "mimo-v2.5"
max_tokens = 8192

[[profiles]]
name = "deepseek"
kind = "native_oai"
base_url = "https://api.deepseek.com/v1"
api_key_env = "DEEPSEEK_API_KEY"
auth_scheme = "bearer"
api_mode = "chat_completions"
stream = true
timeout_secs = 1800
max_tokens = 65536
reasoning_effort = "high"

[[profiles.models]]
name = "pro"
id = "deepseek-v4-pro"
reasoning_effort = "max"
max_tokens = 65536
timeout_secs = 2400

[[profiles.models]]
name = "flash"
id = "deepseek-v4-flash"
reasoning_effort = "high"
max_tokens = 32768
timeout_secs = 1800

[[profiles]]
name = "openai"
kind = "native_oai"
base_url = "https://api.openai.com/v1"
api_key_env = "OPENAI_API_KEY"
auth_scheme = "bearer"
api_mode = "responses"
stream = true
reasoning_effort = "medium"
max_tokens = 32768

[[profiles.models]]
name = "default"
id = "gpt-5.2"
reasoning_effort = "medium"
max_tokens = 32768

[[profiles.models]]
name = "pro"
id = "gpt-5.2-pro"
reasoning_effort = "high"
max_tokens = 65536
timeout_secs = 2400

[[profiles.models]]
name = "mini"
id = "gpt-5-mini"
reasoning_effort = "low"
max_tokens = 16384

[[profiles.models]]
name = "codex"
id = "gpt-5.2-codex"
reasoning_effort = "high"
max_tokens = 65536
timeout_secs = 2400

[[profiles]]
name = "glm"
kind = "native_oai"
base_url = "https://open.bigmodel.cn/api/paas/v4"
api_key_env = "ZHIPUAI_API_KEY"
auth_scheme = "bearer"
api_mode = "chat_completions"
stream = true
timeout_secs = 1800
max_tokens = 32768
thinking_type = "enabled"

[[profiles.models]]
name = "default"
id = "glm-5.1"
max_tokens = 65536
timeout_secs = 2400
thinking_type = "enabled"

[[profiles.models]]
name = "stable"
id = "glm-4.7"
max_tokens = 65536
timeout_secs = 2400
thinking_type = "enabled"

[[profiles.models]]
name = "flash"
id = "glm-4.5-flash"
max_tokens = 16384
thinking_type = "disabled"

[[profiles]]
name = "claude"
kind = "native_claude"
base_url = "https://api.anthropic.com/v1"
api_key_env = "ANTHROPIC_API_KEY"
auth_scheme = "x-api-key"
stream = true
thinking_type = "adaptive"

[[profiles.models]]
name = "sonnet"
id = "claude-3-5-sonnet-latest"

[[profiles]]
name = "openrouter"
kind = "native_oai"
base_url = "https://openrouter.ai/api/v1"
api_key_env = "OPENROUTER_API_KEY"
auth_scheme = "bearer"
api_mode = "chat_completions"
stream = true

[profiles.headers]
HTTP-Referer = "https://koda-agent.local"
X-Title = "Koda Agent"

[[profiles.models]]
name = "sonnet"
id = "anthropic/claude-3.5-sonnet"

[mixin]
llm_nos = ["mimo:pro", "deepseek:pro", "openai:default", "glm:default"]
max_retries = 3
base_delay = 1.5
spring_back = 300
